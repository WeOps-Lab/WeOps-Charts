apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Chart.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
{{ toYaml .Values.labels | indent 8 }}
      name: {{ .Chart.Name }}
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/metrics'
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: {{ .Chart.Name }}
          image: {{.Values.image}}
          imagePullPolicy: IfNotPresent
          args:
            - "--housekeeping_interval=15s"
            - "--docker_only=true"
            - "--disable_metrics=advtcp,app,cpu,cpuLoad,cpu_topology,cpuset,disk,diskIO,hugetlb,memory,memory_numa,network,oom_event,percpu,perf_event,process,referenced_memory,resctrl,sched,tcp,udp"
            - "--enable_metrics=cpu,cpuLoad,network,disk,diskIO,memory"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh","-c","sleep 15"]
          resources:
            requests:
              cpu: 100m
              memory: 150Mi
            limits:
              cpu: 500m
              memory: 800Mi
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
            - name: var-run-ns
              mountPath: /var/run/netns
              readOnly: true
            - name: sys
              mountPath: /sys
            {{ if eq .Values.container_runtime "containerd" }}- name: containerd
              mountPath: /var/lib/containerd{{ else }}- name: docker
              mountPath: /var/lib/docker{{ end }}
            - name: disk
              mountPath: /dev/disk
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run-ns
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        - name: sys
          hostPath:
            path: /sys
        {{ if eq .Values.container_runtime "containerd" }}- name: containerd
          hostPath:
            path: /var/lib/containerd{{ else }}- name: docker
          hostPath:
            path: /var/lib/docker{{ end }}
        - name: disk
          hostPath:
            path: /dev/disk              
