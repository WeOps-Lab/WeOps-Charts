apiVersion: v1
kind: ConfigMap
metadata:
  name: node-exporter-nginx-config
  labels:
    app: {{ .Chart.Name }}
data:
  nginx.conf: |
    worker_processes 1;
    error_log stderr warn;
    pid /tmp/nginx.pid;
    
    events {
        worker_connections 1024;
    }
    
    http {
        access_log off;
        client_body_temp_path /tmp/client_body;
        proxy_temp_path /tmp/proxy;
        
        server {
            listen {{ .Values.ports.external }};
            
            # 只允许 /metrics
            location = /metrics {
                proxy_pass http://127.0.0.1:{{ .Values.ports.internal }}/metrics;
            }
            
            # 拒绝 pprof
            location ~ ^/debug {
                return 403 "Access denied";
            }
            
            # 拒绝其他路径
            location / {
                return 404;
            }
        }
    }
