apiVersion: v1
kind: ConfigMap
metadata:
  name: weops-flow-config
  labels:
    app: weops-flow
data:
  flow.yml: |
    prometheus.remote_write "staging" {
      endpoint {
        url = "{{ .Values.remoteWrtieUrl }}"
      }
    }

    discovery.kubernetes "asserts" {
      role = "pod"
      namespaces {
        own_namespace = true
      }
      selectors {
        role = "pod"
        label = "app.kubernetes.io/name=kube-state-metrics"
      }
    }

    discovery.kubernetes "monitors" {
      role = "pod"
      namespaces {
        own_namespace = true
      }
      selectors {
        role = "pod"
        label = "app in (node-exporter,cadvisor-exporter)"
      }
    }


    discovery.kubernetes "kube_proxy" {                                                                                                                                
      role = "pod"                                                                                                                                                           
      selectors {                                                                                                                                                            
        role = "pod"                                                                                                                                                         
        label = "k8s-app=kube-proxy"                                                                                                                                         
      }                                                                                                                                                                      
    }                                                                                                                                                                        

    discovery.relabel "kube_proxy_relabel" {                                                                                                                                      
      targets = discovery.kubernetes.kube_proxy.targets                                                                                                                
      rule  {                                                                                                                                                                
          action        = "replace"                                                                                                                                          
          source_labels = ["__address__"]                                                                                                                                    
          regex         = "([^:]+)(?::\\d+)?"                                                                                                                                
          replacement   = "$1:{{ .Values.kubeProxyPort }}"                                                                                                                                         
          target_label  = "__address__"                                                                                                                                      
      }                                                                                                                                                                      
    }

    prometheus.scrape "kube_proxy" {
      targets = discovery.relabel.kube_proxy_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }                            

    discovery.kubernetes "kube_dns" {                                                                                                                                  
      role = "pod"                                                                                                                                                         
      selectors {                                                                                                                                                          
        role = "pod"                                                                                                                                                       
        label = "k8s-app=kube-dns"                                                                                                                                         
      }                                                                                                                                                                    
    }                                                                                                                                            

    discovery.relabel "kube_dns_relabel" {                                                                                                                                      
      targets = discovery.kubernetes.kube_dns.targets                                                                                                                
      rule  {                                                                                                                                                              
          action        = "replace"                                                                                                                                        
          source_labels = ["__address__"]                                                                                                                                  
          regex         = "([^:]+)(?::\\d+)?"                                                                                                                              
          replacement   = "$1:{{ .Values.kubeDnsPort }}"                                                                                                                                         
          target_label  = "__address__"                                                                                                                                    
      }                                                                                                                                                                    
    }

    prometheus.scrape "kube_dns" {
      targets = discovery.relabel.kube_dns_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }

    discovery.kubernetes "kube_apiserver" {                                                                                                                              
      role = "pod"                                                                                                                                                           
      selectors {                                                                                                                                                            
        role = "pod"                                                                                                                                                         
        label = "component=kube-apiserver"                                                                                                                                    
      }                                                                                                                                                                      
    }

    discovery.relabel "kube_apiserver_relabel" {                                                                                                                                      
      targets = discovery.kubernetes.kube_apiserver.targets                                                                                                                
      rule  {                                                                                                                                                                
          action        = "replace"                                                                                                                                          
          source_labels = ["__address__"]                                                                                                                                    
          regex         = "([^:]+)(?::\\d+)?"                                                                                                                                
          replacement   = "$1:{{ .Values.kubeApiServerPort }}"                                                                                                                                         
          target_label  = "__address__"                                                                                                                                      
      }                                                                                                                                                                      
    }

    prometheus.scrape "kube_apiserver" {
      targets = discovery.relabel.kube_apiserver_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }

    discovery.kubernetes "kube_controller_manager" {                                                                                                                    
      role = "pod"                                                                                                                                                           
      selectors {                                                                                                                                                            
        role = "pod"                                                                                                                                                         
        label = "component=kube-controller-manager"                                                                                                                          
      }                                                                                                                                                                      
    }

    discovery.relabel "kube_controller_manager_relabel" {                                                                                                                                      
      targets = discovery.kubernetes.kube_controller_manager.targets                                                                                                                
      rule  {                                                                                                                                                                
          action        = "replace"                                                                                                                                          
          source_labels = ["__address__"]                                                                                                                                    
          regex         = "([^:]+)(?::\\d+)?"                                                                                                                                
          replacement   = "$1:{{ .Values.kubeControllerManagerPort }}"                                                                                                                                         
          target_label  = "__address__"                                                                                                                                      
      }                                                                                                                                                                      
    }

    prometheus.scrape "kube_controller_manager" {
      targets = discovery.relabel.kube_controller_manager_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }

    discovery.kubernetes "kube_scheduler" {                                                                                                                              
      role = "pod"                                                                                                                                                           
      selectors {                                                                                                                                                            
        role = "pod"                                                                                                                                                         
        label = "component=kube-scheduler"                                                                                                                                    
      }                                                                                                                                                                      
    }

    discovery.relabel "kube_scheduler_relabel" {                                                                                                                                      
      targets = discovery.kubernetes.kube_scheduler.targets                                                                                                                
      rule  {                                                                                                                                                                
          action        = "replace"                                                                                                                                          
          source_labels = ["__address__"]                                                                                                                                    
          regex         = "([^:]+)(?::\\d+)?"                                                                                                                                
          replacement   = "$1:{{ .Values.kubeSchedulerPort }}"                                                                                                                                         
          target_label  = "__address__"                                                                                                                                      
      }                                                                                                                                                                      
    }

    prometheus.scrape "kube_scheduler" {
      targets = discovery.relabel.kube_scheduler_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }

    discovery.kubernetes "kube_etcd" {                                                                                                                                  
      role = "pod"                                                                                                                                                         
      selectors {                                                                                                                                                          
        role = "pod"                                                                                                                                                       
        label = "component=etcd"                                                                                                                                          
      }                                                                                                                                                                    
    }

    discovery.relabel "kube_etcd_relabel" {                                                                                                                                      
      targets = discovery.kubernetes.kube_etcd.targets                                                                                                                
      rule  {                                                                                                                                                                
          action        = "replace"                                                                                                                                          
          source_labels = ["__address__"]                                                                                                                                    
          regex         = "([^:]+)(?::\\d+)?"                                                                                                                                
          replacement   = "$1:{{ .Values.kubeEtcdPort }}"                                                                                                                                         
          target_label  = "__address__"                                                                                                                                      
      }                                                                                                                                                                      
    }

    prometheus.scrape "kube_etcd" {
      targets = discovery.relabel.kube_etcd_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }

    discovery.kubernetes "kubelet" {
      role = "node"
    }
    
    discovery.relabel "kubelet_relabel" {
      targets = discovery.kubernetes.kubelet.targets

      rule  {
          action        = "replace"
          source_labels = ["__address__"]
          target_label  = "kubelet_url"
      }

    }

    prometheus.scrape "kube_kubelet" {
      targets = discovery.relabel.kubelet_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }

    prometheus.scrape "kube_kubelet_probes" {
      targets = discovery.relabel.kubelet_relabel.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = true
      }
      authorization {
        credentials_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        type = "Bearer"
      }
      metrics_path = "/metrics/probes"
      scheme = "https"
      forward_to = [prometheus.remote_write.staging.receiver]
    }

    discovery.relabel "assertselector" {
      targets    = discovery.kubernetes.asserts.targets

      rule {
        action        = "replace"
        target_label  = "cluster"
        replacement   = {{ .Values.kubeClusterLabel | quote }}
      }

      rule {
        action        = "replace"
        target_label  = "protocol"
        replacement   = "kubernetes"
      }

      rule  {
          action        = "keep"
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
      }

      rule  {
          action        = "replace"
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          regex         = "([^:]+)(?::\\d+)?;(\\d+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
      }

      rule  {
          source_labels = ["__meta_kubernetes_service_name"]
          target_label  = "service"
      }
    }


    discovery.relabel "monitorselector" {
      targets    = discovery.kubernetes.monitors.targets

      rule {
        action        = "replace"
        target_label  = "cluster"
        replacement   = {{ .Values.kubeClusterLabel | quote }}
      }

      rule {
        action        = "replace"
        target_label  = "protocol"
        replacement   = "kubernetes"
      }

      rule  {
          action        = "keep"
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
      }

      rule  {
          action        = "replace"
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          regex         = "([^:]+)(?::\\d+)?;(\\d+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
      }

      rule  {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
      }

      rule  {
          source_labels = ["__meta_kubernetes_service_name"]
          target_label  = "service"
      }
    }

    prometheus.relabel "monitorrelabel" {
      forward_to = [prometheus.remote_write.staging.receiver]

      rule {
        source_labels = ["container_label_io_kubernetes_container_name"]
        target_label  = "container"
        replacement = "$1"
      }

      rule {
        source_labels = ["container_label_io_kubernetes_pod_namespace"]
        target_label  = "namespace"
        replacement = "$1"
      }

      rule {
        source_labels = ["container_label_io_kubernetes_pod_name"]
        target_label  = "pod"
        replacement = "$1"
      }

      rule {
        source_labels = ["container_label_io_kubernetes_pod_uid"]
        action        = "replace"
        target_label  = "uid"
        replacement = "$1"
      }

      rule {
        source_labels = ["__name__"]
        regex         = "node_disk_io_now"
        target_label  = "dimision"
        replacement   = "device"
      }

      rule {
        source_labels = ["__name__"]
        regex         = "container_spec_memory_limit_bytes|container_cpu_utilization|container_memory_usage_bytes|container_memory_utilization|container_cpu_load_average_10s"
        target_label  = "dimision"
        replacement   = "container"
      }

      rule {
        source_labels = ["__name__"]
        regex         = "node_filesystem_size_bytes|node_filesystem_avail_bytes"
        target_label  = "dimision"
        replacement   = "device,fstype,mountpoint"
      }
    }

    prometheus.relabel "assertrelabel" {
      forward_to = [prometheus.remote_write.staging.receiver]

      rule {
        source_labels = ["__name__"]
        regex = "kube_node_status_condition"
        target_label  = "dimision"
        replacement = "condition,status"
      }

      rule {
        source_labels = ["__name__"]
        regex = "kube_pod_status_phase"
        target_label  = "dimision"
        replacement = "phase"
      }
    }

    prometheus.scrape "monitor" {
      targets = discovery.relabel.monitorselector.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      forward_to = [prometheus.relabel.monitorrelabel.receiver]
    }

    prometheus.scrape "assert" {
      targets = discovery.relabel.assertselector.output
      scrape_interval = "60s"
      scrape_timeout = "60s"
      forward_to = [prometheus.relabel.assertrelabel.receiver]
    }
